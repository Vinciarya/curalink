version: '3.8'
services:
  mongodb:
    image: mongo:7
    container_name: curalink-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - curalink-network

  backend:
    build: ./backend
    container_name: curalink-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/curalink
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - curalink-network

  frontend:
    build: ./frontend
    container_name: curalink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - curalink-network

volumes:
  mongo_data:

networks:
  curalink-network:
    driver: bridge
